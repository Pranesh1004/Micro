server.port=8210

# --- Eureka service discovery ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# --- Spring Cloud Gateway Routing ---
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8180
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=flight-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8181
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/flights/**

spring.cloud.gateway.server.webflux.routes[2].id=booking-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8182
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/bookings/**

spring.cloud.gateway.server.webflux.routes[3].id=checkin-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8193
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/checkin/**

spring.cloud.gateway.server.webflux.routes[4].id=crew-service
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8184
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/crew/**

spring.cloud.gateway.server.webflux.routes[5].id=loyalty-service
spring.cloud.gateway.server.webflux.routes[5].uri=http://localhost:8185
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/loyalty/**

spring.cloud.gateway.server.webflux.routes[6].id=booking-service-flights
spring.cloud.gateway.server.webflux.routes[6].uri=http://localhost:8182
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/flights/**

spring.cloud.gateway.server.webflux.routes[7].id=booking-service-airline
spring.cloud.gateway.server.webflux.routes[7].uri=http://localhost:8182
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/airline/**

spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST

spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins[0]=http://127.0.0.1:5500
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins[1]=http://localhost:5500
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins[2]=http://localhost:5600
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins[3]=http://127.0.0.1:5600
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins[4]=http://localhost:8000
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins[5]=http://127.0.0.1:8000
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins[6]=http://localhost:8210
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins[7]=http://localhost:63342
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins[8]=http://127.0.0.1:63342
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods[0]=GET

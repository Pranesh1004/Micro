server.port=8181
spring.datasource.url=jdbc:mysql://localhost:3306/microAir_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# --- Eureka service discovery ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Single-machine dev setup: register by localhost so discovery keeps working
# even when the host's LAN IP changes (Wi-Fi/Ethernet switch). Using
# prefer-ip-address=true previously caused stale IPs (e.g. 192.168.0.5) to be
# registered, making the gateway's service-to-service calls fail with 500.
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

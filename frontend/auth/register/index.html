<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARFOMS - Register</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 500px; margin: 50px auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Register new Account</h3>
                <div id="errorMsg" class="alert alert-danger d-none"></div>
                <div id="successMsg" class="alert alert-success d-none"></div>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" id="regName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" id="regUsername" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="regPassword" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select id="regRole" class="form-select" required>
                            <option value="reservation agent">Reservation Agent</option>
                            <option value="ground staff">Ground Staff</option>
                            <option value="flight dispatcher">Flight Dispatcher</option>
                            <option value="crew scheduler">Crew Scheduler</option>
                            <option value="loyalty manager">Loyalty Manager</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                    <div class="text-center mt-3">
                        <a href="/auth/login/index.html">Already have an account? Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registering...';
            
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.classList.add('d-none');
            successMsg.classList.add('d-none');
            
            const payload = {
                name: document.getElementById('regName').value,
                username: document.getElementById('regUsername').value,
                password: document.getElementById('regPassword').value,
                role: document.getElementById('regRole').value
            };
            
            try {
                const res = await fetch('http://localhost:8210/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successMsg.textContent = "Registration successful! Redirecting to login...";
                    successMsg.classList.remove('d-none');
                    setTimeout(() => window.location.href = '/auth/login/index.html', 2000);
                } else {
                    throw new Error(data.message || "Registration failed");
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = 'Register';
            }
        });
    </script>
</body>
</html>

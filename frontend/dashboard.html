<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARFOMS</title>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primary-deep: #020617;
            --primary-mid: #0b1f5e;
            --primary-vivid: #1d4ed8;
            --accent: #3D7AE6;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
            color: #1e293b;
            background:
                linear-gradient(135deg, rgba(255,255,255,.78) 0%, rgba(239,242,249,.70) 55%, rgba(219,234,254,.64) 100%),
                url("assests/loading.jpg") center / cover no-repeat fixed;
            padding: 24px;
            position: relative;
        }

        /* Subtle static depth glow (no animation) */
        body::before {
            content: "";
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(circle at 18% 22%, rgba(29,78,216,.12) 0%, rgba(29,78,216,0) 40%),
                radial-gradient(circle at 82% 78%, rgba(61,122,230,.10) 0%, rgba(61,122,230,0) 44%);
        }

        .stage {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0;
            animation: fadeIn .9s ease forwards;
        }

        .logo {
            width: 78px; height: 78px; margin: 0 auto 28px;
            border-radius: 18px; display: grid; place-items: center;
            font-size: 1.95rem; color: #fff;
            background: linear-gradient(135deg, var(--primary-vivid), var(--accent));
            box-shadow: 0 14px 34px rgba(29,78,216,.4);
        }
        .title {
            font-size: clamp(2.8rem, 8vw, 5rem);
            font-weight: 800; letter-spacing: .08em; margin: 0;
            color: #0b1f5e;
            text-shadow: 0 6px 22px rgba(11,31,94,.12);
        }
        .divider {
            width: 64px; height: 3px; margin: 22px auto;
            background: linear-gradient(90deg, var(--primary-vivid), var(--accent));
            border-radius: 999px;
        }
        .full-title {
            margin: 0 auto 32px;
            max-width: 640px;
            font-size: clamp(1rem, 2.2vw, 1.3rem); font-weight: 500;
            color: #475569; letter-spacing: .02em; line-height: 1.5;
        }
        .datetime {
            display: inline-flex; align-items: center; gap: 14px;
            padding: 10px 22px; margin-bottom: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,.55);
            border: 1px solid rgba(15,23,42,.08);
            backdrop-filter: blur(4px);
        }
        .datetime .dt-time {
            font-size: 1.25rem; font-weight: 700; color: #0f172a; letter-spacing: .04em;
            font-variant-numeric: tabular-nums;
        }
        .datetime .dt-sep { width: 1px; height: 22px; background: rgba(15,23,42,.14); }
        .datetime .dt-date { font-size: .92rem; font-weight: 500; color: #64748b; }
        .btn-login {
            display: inline-flex; align-items: center; gap: 12px;
            background: linear-gradient(135deg, var(--primary-vivid), var(--accent));
            color: #fff; font-weight: 600; font-size: 1.02rem;
            padding: 14px 44px; border-radius: 10px; text-decoration: none;
            box-shadow: 0 12px 28px rgba(29,78,216,.4);
            transition: transform .15s ease, filter .15s ease;
        }
        .btn-login:hover { transform: translateY(-2px); filter: brightness(1.08); }
        .btn-login .arrow { transition: transform .2s ease; }
        .btn-login:hover .arrow { transform: translateX(4px); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .stage { animation: none; opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="stage">
        <div class="logo"><i class="fa-solid fa-plane-up"></i></div>
        <h1 class="title">ARFOMS</h1>
        <div class="divider"></div>
        <p class="full-title">Airline Reservation &amp; Flight Operations Management System</p>
        <div class="datetime">
            <span class="dt-time" id="dtTime">--:--:--</span>
            <span class="dt-sep"></span>
            <span class="dt-date" id="dtDate">—</span>
        </div>
        <a href="loading.html" class="btn-login">
            <i class="fa-solid fa-right-to-bracket"></i> Login
            <i class="fa-solid fa-arrow-right arrow"></i>
        </a>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            document.getElementById('dtTime').textContent = now.toLocaleTimeString('en-GB');
            document.getElementById('dtDate').textContent = now.toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airline System - Loading</title>
 
    <!-- Bootstrap 5 (only for layout/alignment responsiveness) -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    />
 
    <!-- Font Awesome (airplane icon) -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8U5M7M2R5T9jpJ1rssZCvGSqtEtFPdA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    />
 
    <style>
        /* ===== Color system for a premium airline look ===== */
        :root {
            --air-dark-blue: #05254d;
            --air-sky-blue: #1f8ee6;
            --air-soft-blue: #7ac4ff;
            --air-haze-blue: rgba(40, 130, 210, 0.35);
            --air-overlay-dark: rgba(3, 18, 38, 0.72);
            --air-overlay-soft: rgba(3, 18, 38, 0.45);
            --air-white: #ffffff;
            --air-line-bg: rgba(255, 255, 255, 0.2);
            --air-line-fill: linear-gradient(90deg, #7ac4ff 0%, #ffffff 55%, #d4ebff 100%);
            --air-title-glow: rgba(122, 196, 255, 0.55);
            --air-plane-glow: rgba(255, 255, 255, 0.9);
        }
 
        * {
            box-sizing: border-box;
        }
 
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Trebuchet MS", Tahoma, sans-serif;
            color: var(--air-white);
            overflow: hidden;
            background-image: url("assests/loading.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
 
        /* Full-screen stage: no card/box, content sits directly on the background */
        .loading-screen {
            position: relative;
            min-height: 100vh;
            width: 100%;
            padding: 2rem 1rem;
            animation: stageFade 0.9s ease forwards;
            opacity: 0;
        }
 
        /* Decorative soft beam for futuristic airport-dashboard feel */
        .loading-screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, var(--air-overlay-dark) 0%, var(--air-overlay-soft) 70%);
            pointer-events: none;
        }
 
        /* Soft glow ring behind centered content */
        .loading-screen::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0) 35%),
                radial-gradient(circle at 85% 30%, rgba(122, 196, 255, 0.25) 0%, rgba(122, 196, 255, 0) 38%),
                radial-gradient(circle at 50% 80%, rgba(31, 142, 230, 0.25) 0%, rgba(31, 142, 230, 0) 45%);
            filter: blur(1px);
            pointer-events: none;
        }
 
        /* Centered content wrapper */
        .loading-content {
            position: relative;
            z-index: 2;
            gap: clamp(1.5rem, 3vh, 2.4rem);
        }
 
 
        /* ===== Title content placed directly on background ===== */
        .title-zone {
            position: relative;
            z-index: 2;
            margin: 0;
        }
 
        .project-title {
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.2;
            font-size: clamp(1.55rem, 4vw, 3rem);
            text-shadow: 0 6px 20px rgba(0, 0, 0, 0.35), 0 0 22px rgba(255, 255, 255, 0.3);
            transition: text-shadow 0.3s ease;
            opacity: 0;
            animation: fadeUp 0.9s ease forwards;
        }
 
        .project-title:hover {
            text-shadow: 0 0 28px var(--air-title-glow);
        }
 
        .project-subtitle {
            margin: 0.65rem 0 0;
            font-size: clamp(0.95rem, 2.2vw, 1.25rem);
            font-weight: 500;
            letter-spacing: 0.45px;
            color: rgba(255, 255, 255, 0.94);
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            opacity: 0;
            animation: fadeUp 0.9s ease forwards;
            animation-delay: 0.18s;
        }
 
        /* ===== Loading line near bottom center ===== */
        .loading-zone {
            position: relative;
            width: min(55vw, 320px);
            z-index: 2;
        }
 
        /* Base runway/loading line */
        .progress-line {
            position: relative;
            height: 4px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.28),
                0 0 10px rgba(5, 37, 77, 0.35);
            animation: lineGlow 1.8s ease-in-out infinite;
            overflow: visible;
        }
 
        /* Fill grows from left to right for loading effect */
        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            border-radius: inherit;
            background: var(--air-line-fill);
            animation: fillRun 3s linear forwards;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.55);
        }
 
        .plane-icon {
 
            position: absolute;
 
            top: -22px;
 
            left: 0%;
 
            font-size: 1.8rem;
 
            color: white;
 
            z-index: 9999;
 
            text-shadow:
                0 0 10px white,
                0 0 20px #7ac4ff,
                0 0 30px rgba(122,196,255,0.8);
 
            animation: planeFly 3s linear forwards;
        }
       
        /* Percentage text below line */
        .loading-percent {
            position: relative;
            margin-top: 0.65rem;
            text-align: center;
            font-weight: 600;
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            letter-spacing: 0.8px;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.28);
        }
 
        /* Optional loading label for clarity */
        .loading-label {
            margin: 0;
            font-size: 0.82rem;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
        }
 
        /* ===== Keyframe animations ===== */
        @keyframes stageFade {
            to {
                opacity: 1;
            }
        }
 
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        @keyframes fillRun {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }
        @keyframes planeFly {
 
            0% {
                left: 0%;
                transform: translateX(-50%) translateY(0px);
            }
 
            50% {
                transform: translateX(-50%) translateY(-6px);
            }
 
            100% {
                left: 100%;
                transform: translateX(-50%) translateY(0px);
            }
        }
 
        @keyframes lineGlow {
            0%, 100% {
                box-shadow:
                    0 0 0 1px rgba(255, 255, 255, 0.28),
                    0 0 18px rgba(5, 37, 77, 0.55);
            }
            50% {
                box-shadow:
                    0 0 0 1px rgba(255, 255, 255, 0.35),
                    0 0 24px var(--air-haze-blue);
            }
        }
 
        /* ===== Responsive adjustments ===== */
        @media (max-width: 767.98px) {
            .title-zone {
                text-align: center;
            }
 
            .loading-zone {
                width: min(85vw, 360px);
            }
        }
 
        @media (max-width: 575.98px) {
            .loading-content::before {
                inset: -30% -20% auto;
            }
 
            .project-title {
                letter-spacing: 0.5px;
            }
 
            .project-subtitle {
                margin-top: 0.55rem;
            }
        }
    </style>
</head>
<body>
    <main class="loading-screen container-fluid d-flex align-items-center justify-content-center">
        <div class="loading-content d-flex flex-column align-items-center text-center">
            <section class="title-zone">
                <h1 class="project-title">Airline System</h1>
                <p class="project-subtitle">Preparing your journey...</p>
            </section>
 
            <section class="loading-zone" aria-label="Loading progress section">
                <p class="loading-label mb-1">Boarding Sequence</p>
                <div class="progress-line" role="progressbar" aria-label="Loading progress">
                    <div class="progress-fill"></div>
                    <div class="plane-icon">✈</div>
                </div>
                <div class="loading-percent" id="loadingPercent" aria-live="polite">0%</div>
            </section>
        </div>
    </main>
 
    <script>
        (function () {
            var duration = 3000;
            var start = Date.now();
            var percentEl = document.getElementById("loadingPercent");
 
            function tick() {
                var elapsed = Date.now() - start;
                var progress = Math.min(elapsed / duration, 1);
                var value = Math.round(progress * 100);
                percentEl.textContent = value + "%";
 
                if (progress < 1) {
                    requestAnimationFrame(tick);
                }
            }
 
            tick();
        })();
 
        setTimeout(function () {
                window.location.href = "auth/login/index.html";
        }, 3000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; color: #212529; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .page-content { padding-top: 110px; }
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; width: 100%; height: 80px;
            z-index: 1030; display: flex; align-items: center;
            background: linear-gradient(90deg, #020617 0%, #0b1f5e 55%, #1d4ed8 100%);
            box-shadow: 0 10px 28px rgba(2,6,23,.22);
        }
        .top-nav-inner {
            position: relative; width: 100%; height: 100%; padding: 0 28px;
            display: flex; align-items: center; justify-content: space-between; gap: 20px;
        }
        .nav-left, .nav-right { display: flex; align-items: center; flex: 1 1 0; min-width: 0; }
        .nav-left  { justify-content: flex-start; }
        .nav-right { justify-content: flex-end; }
        .nav-title {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
            color: #fff; font-size: 1.6rem; font-weight: 800; letter-spacing: .02em;
            white-space: nowrap; pointer-events: none;
        }
        .nav-icon {
            width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center;
            background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.14);
            color: #fff; font-size: 1.2rem; flex-shrink: 0;
        }
        .nav-pill {
            display: flex; align-items: center; gap: 10px; padding: .55rem .9rem;
            border-radius: 999px; border: 1px solid rgba(255,255,255,.24);
            background: rgba(255,255,255,.08); color: #fff; backdrop-filter: blur(8px);
            white-space: nowrap; flex-shrink: 0;
        }
        .nav-pill-brand { font-weight: 800; letter-spacing: .03em; }
        .card { background-color: #ffffff; border: 1px solid #e9ecef; border-radius: 12px; }
        .flight-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06) !important; }
        .form-label { font-weight: 600; font-size: 0.875rem; color: #495057; }
        .price-tag { color: #0d6efd; font-size: 1.4rem; font-weight: 700; }
        .flight-duration { color: #6c757d; font-size: 0.85rem; }
        .route-card { cursor: pointer; border: 1px solid #e9ecef; border-radius: 12px; transition: all .2s ease; overflow: hidden; }
        .route-card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(2,6,23,.12); border-color: #1d4ed8; }
        .route-card .route-head { background: linear-gradient(90deg, #0b1f5e, #1d4ed8); color: #fff; padding: 10px 16px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
        .route-card .route-body { padding: 16px; }
        .route-badge { background: #e8f0ff; color: #1d4ed8; font-weight: 600; border-radius: 999px; padding: 2px 10px; font-size: .75rem; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="top-nav-inner">
        <div class="nav-left" aria-hidden="true">
            <div class="nav-icon"><i class="fa-solid fa-plane-up"></i></div>
        </div>
        <div class="nav-title">Flight Booking</div>
        <div class="nav-right">
            <a href="details/index.html" class="nav-pill text-decoration-none me-2">
                <i class="fa-solid fa-suitcase-rolling"></i><span>Manage Booking</span>
            </a>
            <div class="nav-pill d-none d-md-inline-flex">
                <span class="nav-pill-brand">ARFOMS</span>
            </div>
        </div>
    </div>
</nav>

<div class="container page-content pb-5">

    <div class="card mb-5 shadow-sm border-0">
        <div class="card-body p-4">
            <h5 class="card-title fw-bold mb-4 text-secondary">Search Flights</h5>

            <form id="searchForm">
                <div class="row g-3">

                    <div class="col-12 col-md-6 col-lg-2">
                        <label class="form-label" for="flightType">Flight Type</label>
                        <select class="form-select" id="flightType" onchange="filterLocations()">
                            <option value="domestic">Domestic</option>
                            <option value="international">International</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6 col-lg-3">
                        <label class="form-label" for="fromLocation">From</label>
                        <select class="form-select" id="fromLocation" autocomplete="off">
                            <option value="" disabled selected>Select Origin</option>
                            <optgroup label="Domestic (India)" class="domestic-opts">
                                <option value="MAA">Chennai</option>
                                <option value="BOM">Mumbai</option>
                                <option value="BLR">Bangalore</option>
                                <option value="DEL">Delhi</option>
                                <option value="HYD">Hyderabad</option>
                                <option value="CJB">Coimbatore</option>
                                <option value="CCU">Kolkata</option>
                                <option value="PNQ">Pune</option>
                            </optgroup>
                            <optgroup label="International" class="international-opts">
                                <option value="DXB">Dubai</option>
                                <option value="SIN">Singapore</option>
                                <option value="LHR">London</option>
                                <option value="JFK">New York</option>
                                <option value="BKK">Bangkok</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="col-12 col-md-6 col-lg-3">
                        <label class="form-label" for="toLocation">To</label>
                        <select class="form-select" id="toLocation" autocomplete="off">
                            <option value="" disabled selected>Select Destination</option>
                            <optgroup label="Domestic (India)" class="domestic-opts">
                                <option value="MAA">Chennai</option>
                                <option value="BOM">Mumbai</option>
                                <option value="BLR">Bangalore</option>
                                <option value="DEL">Delhi</option>
                                <option value="HYD">Hyderabad</option>
                                <option value="CJB">Coimbatore</option>
                                <option value="CCU">Kolkata</option>
                                <option value="PNQ">Pune</option>
                            </optgroup>
                            <optgroup label="International" class="international-opts">
                                <option value="DXB">Dubai</option>
                                <option value="SIN">Singapore</option>
                                <option value="LHR">London</option>
                                <option value="JFK">New York</option>
                                <option value="BKK">Bangkok</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="col-12 col-md-6 col-lg-2">
                        <label class="form-label" for="departureDate">Departure Date</label>
                        <input type="date" class="form-control" id="departureDate">
                    </div>

                    <div class="col-12 col-md-6 col-lg-1">
                        <label class="form-label" for="passengers">Passengers</label>
                        <input type="number" class="form-control" min="1" max="9" id="passengers" value="1"
                               oninput="if (parseInt(this.value, 10) > 9) { alert('Only 9 passengers are permitted per booking.'); this.value = 9; }">
                    </div>

                    <div class="col-12 col-lg-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Search</button>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <div id="popularSection">
        <h5 class="fw-bold mb-4 text-dark">Popular Flight Routes</h5>
        <div id="popularRoutes" class="row g-3"></div>
    </div>

    <div id="resultsSection" class="d-none">
        <h5 class="fw-bold mb-4 text-dark">Available Flights</h5>
        <div id="noFlights" class="alert alert-info text-center d-none">
            <i class="fa-solid fa-circle-info me-2"></i>No flights found for the selected criteria. Please try different options.
        </div>
        <div id="flightList"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Corrected to match your running Spring Boot backend context mapping
    const API_BASE = "http://localhost:8087/api/v1/flights";

    // Airport code -> City name (mirrors the codes the Flight Scheduler saves).
    const CITY_BY_CODE = {
        MAA: "Chennai", BOM: "Mumbai", BLR: "Bangalore", DEL: "Delhi",
        HYD: "Hyderabad", CJB: "Coimbatore", CCU: "Kolkata", PNQ: "Pune",
        DXB: "Dubai", SIN: "Singapore", LHR: "London", JFK: "New York", BKK: "Bangkok"
    };

    // Show a friendly city name when we know the code, otherwise the raw value.
    function cityName(code) {
        if (!code) return "";
        return CITY_BY_CODE[code] || code;
    }

    // Flights are stored with a single "yyyy-MM-dd HH:mm" (or ...THH:mm) string.
    // Split it into a date ("yyyy-MM-dd") and a time ("HH:mm") for display.
    function splitStoredDateTime(value) {
        if (!value) return { date: "", time: "" };
        const normalized = String(value).replace("T", " ").trim();
        const parts = normalized.split(" ");
        return { date: parts[0] || "", time: parts[1] || "" };
    }

    function filterLocations() {
        const flightType = document.getElementById("flightType").value;
        const domesticGroups = document.querySelectorAll(".domestic-opts");
        const internationalGroups = document.querySelectorAll(".international-opts");
        const fromSelect = document.getElementById("fromLocation");
        const toSelect = document.getElementById("toLocation");

        if (flightType === "international") {
            domesticGroups.forEach(g => g.style.display = "none");
            internationalGroups.forEach(g => g.style.display = "");
        } else {
            domesticGroups.forEach(g => g.style.display = "");
            internationalGroups.forEach(g => g.style.display = "none");
        }

        [fromSelect, toSelect].forEach(select => {
            const opt = select.options[select.selectedIndex];
            if (opt && opt.parentElement && opt.parentElement.style.display === "none") {
                select.value = "";
            }
        });
    }

    function applyMinDepartureDate() {
        const dateInput = document.getElementById("departureDate");
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        const todayStr = `${yyyy}-${mm}-${dd}`;
        dateInput.min = todayStr;
        if (dateInput.value && dateInput.value < todayStr) {
            dateInput.value = todayStr;
        }
    }

    function escapeHtml(value) {
        return String(value == null ? "" : value)
            .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function formatDate(isoDate) {
        if (!isoDate) return "";
        const d = new Date(isoDate);
        if (isNaN(d)) return isoDate;
        return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
    }

    function formatTime(isoTime) {
        if (!isoTime) return "";
        const parts = String(isoTime).split(":");
        const d = new Date();
        d.setHours(parseInt(parts[0] || "0", 10), parseInt(parts[1] || "0", 10), 0);
        return d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
    }

    function renderFlights(flights, criteria) {
        const list = document.getElementById("flightList");
        const noFlights = document.getElementById("noFlights");
        document.getElementById("popularSection").classList.add("d-none");
        document.getElementById("resultsSection").classList.remove("d-none");
        list.innerHTML = "";

        if (!flights || flights.length === 0) {
            noFlights.classList.remove("d-none");
            return;
        }
        noFlights.classList.add("d-none");

        flights.forEach(flight => {
            const dep = splitStoredDateTime(flight.departureTime);
            const arr = splitStoredDateTime(flight.arrivalTime);

            const requested = Math.max(parseInt(criteria.passengers || "1", 10), 1);
            const available = (flight.availableSeats != null) ? Number(flight.availableSeats) : null;
            const soldOut = available === 0;
            const bookable = (available != null) ? Math.min(requested, available) : requested;

            let availabilityHtml;
            if (available == null) {
                availabilityHtml = `<span class="badge bg-secondary">Seats: N/A</span>`;
            } else if (soldOut) {
                availabilityHtml = `<span class="badge bg-danger">Sold out</span>`;
            } else {
                const badgeClass = available < requested ? "bg-warning text-dark" : "bg-success";
                availabilityHtml = `<span class="badge ${badgeClass}">${available} seat${available === 1 ? "" : "s"} available</span>`;
            }

            let noteHtml = "";
            if (!soldOut && available != null && available < requested) {
                noteHtml = `<small class="d-block text-warning mt-1">Only ${bookable} of ${requested} passenger(s) can book on this flight.</small>`;
            }

            const card = document.createElement("div");
            card.className = "card flight-card mb-3 shadow-sm";
            card.innerHTML = `
                <div class="card-body p-4">
                    <div class="row g-3 align-items-center text-center text-md-start">
                        <div class="col-md-3">
                            <h5 class="fw-bold">${escapeHtml(flight.flightName || flight.airlineName || "—")}</h5>
                            <small class="text-muted">${escapeHtml(flight.flightNumber)}</small>
                            <span class="badge bg-success ms-2">${escapeHtml(flight.flightStatus)}</span>
                        </div>
                        <div class="col-md-5">
                            <div class="d-flex align-items-center justify-content-center gap-2">
                                <div class="text-center">
                                    <strong>${escapeHtml(cityName(flight.origin))}</strong>
                                    <small class="flight-duration d-block">${formatDate(dep.date)}</small>
                                    <div class="flight-duration">${formatTime(dep.time)}</div>
                                </div>
                                <div class="text-center flex-grow-1 px-2">
                                    <small class="text-primary d-block fs-5">&rarr;</small>
                                    <hr class="my-0">
                                    <small class="text-muted">Route</small>
                                </div>
                                <div class="text-center">
                                    <strong>${escapeHtml(cityName(flight.destination))}</strong>
                                    <small class="flight-duration d-block">${formatDate(arr.date)}</small>
                                    <div class="flight-duration">${formatTime(arr.time)}</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4 text-md-end">
                            <div class="mb-2">${availabilityHtml}${noteHtml}</div>
                            <button class="btn btn-outline-primary select-flight-btn" ${soldOut ? "disabled" : ""}>
                                ${soldOut ? "Unavailable" : "Select Flight"}
                            </button>
                        </div>
                    </div>
                </div>`;

            const selectBtn = card.querySelector(".select-flight-btn");
            if (!soldOut) {
                selectBtn.addEventListener("click", () => {
                    if (available != null && available < requested) {
                        alert(`This flight has only ${available} seat(s) available. Continuing with ${bookable} passenger(s).`);
                    }
                    const selection = {
                        flightId: flight.flightId || flight.id,
                        flightNumber: flight.flightNumber,
                        flightType: criteria.flightType,
                        fromLocation: flight.origin,
                        toLocation: flight.destination,
                        departureDate: dep.date,
                        departureTimeOnly: dep.time,
                        arrivalTimeOnly: arr.time,
                        passengers: bookable,
                        availableSeats: available,
                        airline: flight.airlineName || flight.airline
                    };
                    console.log('Flight selection:', selection);
                    sessionStorage.setItem("selectedFlight", JSON.stringify(selection));
                    window.location.href = "passenger-details.html";
                });
            }
            list.appendChild(card);
        });
    }

    document.getElementById("searchForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const criteria = {
            flightType: document.getElementById("flightType").value,
            fromLocation: document.getElementById("fromLocation").value,
            toLocation: document.getElementById("toLocation").value,
            departureDate: document.getElementById("departureDate").value,
            passengers: parseInt(document.getElementById("passengers").value || "1", 10)
        };
        await performSearch(criteria);
    });

    async function performSearch(criteria) {
        try {
            const res = await fetch(`${API_BASE}/search`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(criteria)
            });
            if (!res.ok) throw new Error("Search failed");
            const flights = await res.json();
            renderFlights(flights, criteria);
        } catch (err) {
            alert("Unable to search flights. Please try again.");
            console.error(err);
        }
    }

    const INTERNATIONAL_LOCATIONS = ["DXB", "SIN", "LHR", "JFK", "BKK"];

    function istTodayStr() {
        return new Intl.DateTimeFormat("en-CA", {
            timeZone: "Asia/Kolkata", year: "numeric", month: "2-digit", day: "2-digit"
        }).format(new Date());
    }

    function isInternationalRoute(origin, destination) {
        return INTERNATIONAL_LOCATIONS.includes(origin) || INTERNATIONAL_LOCATIONS.includes(destination);
    }

    function estimateFare(origin, destination) {
        return isInternationalRoute(origin, destination) ? "₹18,500" : "₹5,200";
    }

    async function renderPopularRoutes() {
        const container = document.getElementById("popularRoutes");
        container.innerHTML = `<div class="col-12 text-muted"><i class="fa-solid fa-spinner fa-spin me-2"></i>Loading upcoming popular routes...</div>`;

        const today = istTodayStr();
        let flights = [];
        try {
            const res = await fetch(`${API_BASE}`);
            if (!res.ok) throw new Error("Failed to load flights");
            flights = await res.json();
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="col-12"><div class="alert alert-warning mb-0"><i class="fa-solid fa-triangle-exclamation me-2"></i>Unable to load popular routes right now.</div></div>`;
            return;
        }

        const upcoming = flights
            .map(f => ({ ...f, _dep: splitStoredDateTime(f.departureTime) }))
            .filter(f => f._dep.date && f._dep.date >= today)
            .sort((a, b) => (a._dep.date + (a._dep.time || "")).localeCompare(b._dep.date + (b._dep.time || "")));

        const seen = new Set();
        const popular = [];
        for (const f of upcoming) {
            const key = `${f.origin}->${f.destination}`;
            if (seen.has(key)) continue;
            seen.add(key);
            popular.push(f);
            if (popular.length >= 6) break;
        }

        if (popular.length === 0) {
            container.innerHTML = `<div class="col-12"><div class="alert alert-info mb-0"><i class="fa-solid fa-circle-info me-2"></i>No upcoming popular routes available at the moment.</div></div>`;
            return;
        }

        container.innerHTML = "";
        popular.forEach(flight => {
            const type = isInternationalRoute(flight.origin, flight.destination) ? "international" : "domestic";
            const col = document.createElement("div");
            col.className = "col-12 col-md-6 col-lg-4";
            col.innerHTML = `
                <div class="route-card h-100">
                    <div class="route-head">
                        <span><i class="fa-solid fa-plane-departure me-2"></i>${escapeHtml(cityName(flight.origin))} &rarr; ${escapeHtml(cityName(flight.destination))}</span>
                        <span class="route-badge text-capitalize">${type}</span>
                    </div>
                    <div class="route-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                               <div class="fw-semibold">${escapeHtml(flight.flightName || flight.airlineName || "—")}</div>
                                <small class="flight-duration"><i class="fa-regular fa-calendar me-1"></i>${formatDate(flight._dep.date)}</small>
                                <small class="flight-duration d-block"><i class="fa-regular fa-clock me-1"></i>${formatTime(flight._dep.time)}</small>
                            </div>
                            <div class="text-end">
                                <div class="price-tag">${estimateFare(flight.origin, flight.destination)}</div>
                                <small class="text-muted">onwards</small>
                            </div>
                        </div>
                        <button class="btn btn-outline-primary w-100 mt-3 book-route-btn">
                            <i class="fa-solid fa-magnifying-glass me-1"></i>View Flights
                        </button>
                    </div>
                </div>`;
            col.querySelector(".book-route-btn").addEventListener("click", () => {
                document.getElementById("flightType").value = type;
                filterLocations();
                document.getElementById("fromLocation").value = flight.origin;
                document.getElementById("toLocation").value = flight.destination;
                document.getElementById("departureDate").value = flight._dep.date;
                performSearch({
                    flightType: type,
                    fromLocation: flight.origin,
                    toLocation: flight.destination,
                    departureDate: flight._dep.date,
                    passengers: parseInt(document.getElementById("passengers").value || "1", 10)
                });
                window.scrollTo({ top: 0, behavior: "smooth" });
            });
            container.appendChild(col);
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("fromLocation").selectedIndex = 0;
        document.getElementById("toLocation").selectedIndex = 0;
        filterLocations();
        applyMinDepartureDate();
        renderPopularRoutes();
    });
</script>
</body>
</html>
